appId: com.terminal.app
productName: TerMinal
# electron-vite outputs the bundled main/preload/renderer to out/; package that.
directories:
  buildResources: build # build/icon.icns is picked up automatically
files:
  - out/**
  - package.json
# The headless cron runner + script helpers ship as real files
# (Contents/Resources/{terminal-cron,terminal-cli}); the app copies them to
# ~/.config/TerMinal/bin on launch so launchd + scripts have stable paths.
extraResources:
  - from: bin/terminal-cron
    to: terminal-cron
  - from: bin/terminal-cli
    to: terminal-cli
# node-pty ships a native .node binary that can't live inside the asar archive.
asarUnpack:
  - '**/node_modules/node-pty/**'
mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.developer-tools
  # Unsigned local build — skip code signing / notarization. First launch needs
  # right-click → Open (Gatekeeper), then it runs normally.
  identity: null
